name: Build and push Docker images

on:
  # Build images daily.
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - .github/workflows/build-custom-docker-images.yaml
      - docker/**
  pull_request:
    branches:
      - master
    paths:
      - .dockerignore
      - .github/scripts/**
      - .github/workflows/build-and-push-image.yaml
      - .github/workflows/build-docker-images.yaml
      - .github/workflows/build-custom-docker-images.yaml
      - docker/**
  workflow_dispatch:
    inputs:
      force_rebuild:
        type: boolean
        description: Force rebuild (even if images for the latest commit already exist)
        default: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    outputs:
      commit_hash: ${{ steps.prepare-default-build.outputs.commit_hash }}
      any_images_to_build: ${{ steps.prepare-default-build.outputs.any_images_to_build }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Compares every upstream reference vmangos-deploy depends on (patched
      # MariaDB entrypoint, bundled config templates, root `CMakeLists.txt`
      # where new build deps would surface, ...) against its current upstream
      # revision. The pinned SHAs anchor what each was last reviewed against;
      # bump the matching SHA below after refreshing the local copy.
      - name: Check for upstream drift
        id: upstream-drift-check
        env:
          # When bumping `MARIADB_DOCKER_KNOWN_SHA`, also update the matching
          # SHA in `docker/database/Dockerfile` and the header comment in
          # `docker/database/docker-entrypoint.sh` so all three stay in sync.
          MARIADB_DOCKER_KNOWN_SHA: 66972bc2e0c6fd33dcd5d98de0653c5696a1166e
          VMANGOS_KNOWN_SHA: 8d27aeed57432d67d14ab02d766ca61690d38361
        run: ./.github/scripts/check-upstream-drift.sh

      # We check if the workflow was triggered by a schedule and if today is
      # Monday, in which case we want to trigger a (re)build in any case (to
      # keep the Docker images up-to-date).
      #
      # We also check if the "force rebuild" input is checked when the workflow
      # is triggered manually; if yes, we also want to (re)build.
      - name: Prepare default build
        id: prepare-default-build
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: vmangos-database
          VMANGOS_REPOSITORY_OWNER: vmangos
          VMANGOS_REPOSITORY_NAME: core
          VMANGOS_REVISION: development
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: ./.github/scripts/prepare-default-build.sh

  build-and-push-server-images:
    name: Build and push server images
    needs: setup
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        client_version: [5875, 5464, 5302, 5086, 4878, 4695, 4544, 4449]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      workflow_mode: default
      image_kind: server
      architectures: both
      push_images: ${{ github.event_name != 'pull_request' }}
      commit_hash: ${{ needs.setup.outputs.commit_hash }}
      client_version: ${{ matrix.client_version }}

  # We build database images only after the server build succeeds; otherwise, a
  # failure there could leave the latest database images out of sync.
  build-and-push-database-images:
    name: Build and push database images
    needs: [setup, build-and-push-server-images]
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      workflow_mode: default
      image_kind: database
      architectures: both
      push_images: ${{ github.event_name != 'pull_request' }}
      commit_hash: ${{ needs.setup.outputs.commit_hash }}

  delete-old-package-versions:
    name: Delete old package versions
    needs: [setup, build-and-push-server-images, build-and-push-database-images]
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each build of the server image creates 24 packages (one image index
          # plus two image manifests, times the 8 client versions in the
          # matrix). Keeping 960 versions therefore retains 40 builds worth of
          # server images.
          - package_name: vmangos-server
            min_versions_to_keep: 960
          # Each build of the database image creates 3 packages (one image
          # index plus two image manifests). Keeping 120 versions retains the
          # same 40 builds worth as above.
          - package_name: vmangos-database
            min_versions_to_keep: 120

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package_name }}
          package-type: container
          min-versions-to-keep: ${{ matrix.min_versions_to_keep }}

  update-badges:
    name: Update badges
    needs: [setup, build-and-push-server-images, build-and-push-database-images, delete-old-package-versions]
    if: ${{ needs.setup.outputs.any_images_to_build == 'true' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload badge JSON files to web server
        env:
          COMMIT_HASH: ${{ needs.setup.outputs.commit_hash }}
          BADGES_FTP_HOST: ${{ secrets.BADGES_FTP_HOST }}
          BADGES_FTP_USERNAME: ${{ secrets.BADGES_FTP_USERNAME }}
          BADGES_FTP_PASSWORD: ${{ secrets.BADGES_FTP_PASSWORD }}
        run: ./.github/scripts/upload-badges.sh
