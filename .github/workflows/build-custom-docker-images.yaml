name: Build and push custom Docker images

on:
  workflow_dispatch:
    inputs:
      repository_url:
        type: string
        required: true
        description: The URL of the VMaNGOS code repository to use
        default: https://github.com/vmangos/core.git
      revision:
        type: string
        required: true
        description: The VMaNGOS code repository revision to use
        default: development
      client_version:
        type: number
        required: true
        description: The client version for which to build VMaNGOS
        default: 5875
      world_db_repository_url:
        type: string
        required: true
        description: The URL of the VMaNGOS world database repository to use
        default: https://github.com/brotalnia/database.git
      world_db_dump_name:
        type: string
        required: true
        description: The name of the VMaNGOS world database dump to use
        default: world_full_14_june_2021
      patches_repository_url:
        type: string
        required: false
        description: (Optional) A URL to a repository that contains patches to apply to the VMaNGOS code (patches have to end in `.patch` and be located in the root of the repository)
      custom_tag_fragment:
        type: string
        required: false
        description: (Optional) A custom name to use as part of the image tags (when provided, this overrides the default `{ owner }-{ repository }-{ revision }` naming scheme)
      architectures:
        type: choice
        required: true
        description: Which architectures should images be built for?
        options:
          - "Both amd64 and arm64"
          - "amd64 only"
          - "arm64 only"
        default: "Both amd64 and arm64"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      repository_owner: ${{ steps.parse-repository-url.outputs.repository_owner }}
      repository_name: ${{ steps.parse-repository-url.outputs.repository_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Resolve only the MariaDB entrypoint commit hash up front. We
      # intentionally skip resolving the VMaNGOS commit hash here (and the
      # matching drift check below): the custom build uses a user-provided
      # repository which may not be `vmangos/core` or even hosted on GitHub, so
      # comparing our pinned `vmangos/core` reference against its upstream
      # `HEAD` would not validate anything about this run.
      - name: Resolve sources
        id: resolve-sources
        env:
          GH_TOKEN: ${{ github.token }}
          MARIADB_DOCKER_REPOSITORY_OWNER: MariaDB
          MARIADB_DOCKER_REPOSITORY_NAME: mariadb-docker
          MARIADB_DOCKER_REVISION: master
        run: ./.github/scripts/resolve-sources.sh

      # The patched MariaDB entrypoint is bundled into every database image we
      # build (regardless of which VMaNGOS fork the user picked), so we still
      # want to know when our pinned copy has drifted from upstream `HEAD`.
      - name: Check for upstream drift
        id: upstream-drift-check
        env:
          MARIADB_DOCKER_REPOSITORY: ${{ steps.resolve-sources.outputs.mariadb_docker_repository }}
          MARIADB_DOCKER_LATEST_COMMIT_HASH: ${{ steps.resolve-sources.outputs.mariadb_docker_commit_hash }}
          # When bumping `MARIADB_DOCKER_KNOWN_COMMIT_HASH`, also update the
          # matching commit hash in `docker/database/Dockerfile` and the header
          # comment in `docker/database/docker-entrypoint.sh` so all three stay
          # in sync.
          MARIADB_DOCKER_KNOWN_COMMIT_HASH: 17937f4efcf313be671a6706b4c72ba6ef07b347
        run: ./.github/scripts/check-upstream-drift.sh

      # The following Git repository URL formats are supported:
      #
      # SSH URLs:
      # - git@github.com:owner/repo.git
      # - git@gitlab.com:owner/repo.git
      # - git@gitea.example.com:owner/repository.git
      # - git@bitbucket.org:owner/repository.git
      #
      # HTTPS URLs:
      # - https://github.com/owner/repo.git
      # - https://gitlab.com/owner/repo.git
      # - https://gitea.example.com/owner/repository.git
      # - https://bitbucket.org/owner/repository.git
      - name: Parse repository URL
        id: parse-repository-url
        env:
          REPOSITORY_URL: ${{ inputs.repository_url }}
        run: ./.github/scripts/parse-repository-url.sh

  build-and-push-server-images:
    name: Build and push server images
    needs: setup
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      workflow_mode: custom
      image_kind: server
      architectures: ${{ inputs.architectures }}
      push_images: true
      repository_url: ${{ inputs.repository_url }}
      repository_owner: ${{ needs.setup.outputs.repository_owner }}
      repository_name: ${{ needs.setup.outputs.repository_name }}
      revision: ${{ inputs.revision }}
      client_version: ${{ inputs.client_version }}
      patches_repository_url: ${{ inputs.patches_repository_url }}
      custom_tag_fragment: ${{ inputs.custom_tag_fragment }}

  # We build database images only after the server build succeeds; otherwise, a
  # failure there could leave the latest database images out of sync.
  build-and-push-database-images:
    name: Build and push database images
    needs: [setup, build-and-push-server-images]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-image.yaml
    with:
      workflow_mode: custom
      image_kind: database
      architectures: ${{ inputs.architectures }}
      push_images: true
      repository_url: ${{ inputs.repository_url }}
      repository_owner: ${{ needs.setup.outputs.repository_owner }}
      repository_name: ${{ needs.setup.outputs.repository_name }}
      revision: ${{ inputs.revision }}
      world_db_repository_url: ${{ inputs.world_db_repository_url }}
      world_db_dump_name: ${{ inputs.world_db_dump_name }}
      patches_repository_url: ${{ inputs.patches_repository_url }}
      custom_tag_fragment: ${{ inputs.custom_tag_fragment }}
